################################################################
# Titre: LGTM & OpenTelemetry Stack (Lab Edition)
# Description : Observabilité moderne (Metrics, Logs, Traces, Profiling)
# Auteur: Ravindra JOB
# Source: https://github.com/ravindrajob/
# Update: 22/05/2026 [v2.0 | RJ]
################################################################

version: '3.8'

services:
  # 1. VISUALIZATION
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    restart: unless-stopped

  # 2. METRICS (CNCF Standard)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus
    restart: unless-stopped

  # 3. LOGS (High Performance)
  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # 4. TRACING (Distributed Tracing)
  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"   # tempo
      - "4317:4317"   # otlp grpc
    restart: unless-stopped

  # 5. COLLECTION (OpenTelemetry Collector)
  # Standard de l'industrie pour la collecte agnostique
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel-collector/config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "1888:1888"   # pprof extension
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "8889:8889"   # Prometheus exporter metrics
      - "13133:13133" # health_check extension
      - "4318:4318"   # OTLP http receiver
    restart: unless-stopped

  # 6. S3 STORAGE SIMULATION (Minio)
  # Pour simuler le stockage long-terme CAF (Azure Blob / S3)
  minio:
    image: minio/minio:latest
    container_name: minio_s3_storage
    ports:
      - "9001:9000"
      - "9002:9001"
    environment:
      - MINIO_ROOT_USER=ravindrajob
      - MINIO_ROOT_PASSWORD=supersecurestorage
    command: server /data --console-address ":9001"
    restart: unless-stopped
